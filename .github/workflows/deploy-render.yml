name: Deploy Backend to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        uses: jakejarvis/render-deploy@v1
        with:
          service: field-forecast-backend
          api_key: ${{ secrets.RENDER_API_KEY }}
          trigger: manual
