services:
  - type: web
    name: field-forecast-backend
    env: docker
    plan: starter
    repo: https://github.com/teddan3/field-forecast
    branch: main
    buildCommand: "docker build -t field-forecast-backend backend/."
    startCommand: "php -S 0.0.0.0:8000 -t backend/public"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: 'false'
      - key: DB_CONNECTION
        value: pgsql
      - key: REDIS_HOST
        value: redis.internal
      - key: API_FOOTBALL_KEY
        fromService:
          name: secret-store
          key: API_FOOTBALL_KEY
